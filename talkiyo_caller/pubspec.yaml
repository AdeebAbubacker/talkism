name: talkiyo_caller
description: "Production-style Flutter caller app using Firebase, Firestore, FCM, Agora, and Provider."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^4.7.0
  firebase_auth: ^6.1.1
  cloud_firestore: ^6.3.0
  firebase_messaging: ^16.0.4
  provider: ^6.1.5
  agora_rtc_engine: ^6.5.3
  permission_handler: ^12.0.1
  flutter_launcher_icons: ^0.14.4
  http: ^1.6.0
  flutter_local_notifications: ^17.2.4
  shared_preferences: ^2.5.5
  uuid: ^4.5.3
  crypto: ^3.0.7
  intl: ^0.20.2
  path_provider: ^2.1.5
  google_fonts: ^8.0.2
  image_picker: ^1.2.1
  firebase_storage: ^13.3.0
  firebase_app_check: ^0.4.3
  just_audio: ^0.10.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icon.png"
  adaptive_icon_background: "#7B2FF7"
  adaptive_icon_foreground: "assets/icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/coin1.png
    - assets/coin2.png
    - assets/coin3.png
    - assets/coin4.png
    - assets/coin5.png
    - assets/coin6.png
    - assets/coin7.png
    - assets/coin8.png
    - assets/coin9.png
    - assets/coinultra.png
    - assets/iphone.mp3
