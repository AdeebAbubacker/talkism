name: talkiyo_reciever
description: "Receiver app for Firebase + Firestore + FCM + Agora calling flow."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.5
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.3
  cloud_firestore: ^5.6.7
  firebase_messaging: ^15.2.5
  flutter_local_notifications: ^19.1.0
  agora_rtc_engine: ^6.5.2
  permission_handler: ^12.0.1
  http: ^1.6.0
  crypto: ^3.0.7
  flutter_launcher_icons: ^0.14.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icon.png"
  adaptive_icon_background: "#7B2FF7"
  adaptive_icon_foreground: "assets/icon.png"  

flutter:
  uses-material-design: true
